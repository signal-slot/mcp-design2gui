name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: macos-14
            name: macos-arm64
          - os: windows-latest
            name: windows-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config \
            libgl-dev libxcb1-dev libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-cursor-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libfontconfig1-dev libfreetype6-dev \
            libglib2.0-dev zlib1g-dev \
            libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Cache static Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:/qt-static' || '~/qt-static' }}
          key: qt-static-6.8.2-${{ matrix.os }}-v5

      - name: Download Qt source
        if: steps.cache-qt.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L -o qtbase.tar.xz \
            https://download.qt.io/official_releases/qt/6.8/6.8.2/submodules/qtbase-everywhere-src-6.8.2.tar.xz
          tar xf qtbase.tar.xz

      - name: Build static Qt (Linux)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          cd qtbase-everywhere-src-6.8.2
          ./configure -static -release -prefix $HOME/qt-static \
            -nomake tests -nomake examples -xcb \
            -- -DFEATURE_cxx20=ON
          cmake --build . --parallel $(nproc)
          cmake --install .

      - name: Build static Qt (macOS)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: |
          cd qtbase-everywhere-src-6.8.2
          ./configure -static -release -prefix $HOME/qt-static \
            -nomake tests -nomake examples \
            -- -DCMAKE_OSX_ARCHITECTURES=arm64 -DFEATURE_cxx20=ON
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          cmake --install .

      - name: Build static Qt (Windows)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          cd qtbase-everywhere-src-6.8.2
          CALL configure.bat -static -release -prefix C:\qt-static -nomake tests -nomake examples -- -DFEATURE_cxx20=ON
          cmake --build . --parallel
          cmake --install .

      - name: Generate Qt6CorePrivate cmake stub
        if: steps.cache-qt.outputs.cache-hit != 'true'
        shell: bash
        run: |
          QT_VER=6.8.2
          if [ "$RUNNER_OS" = "Windows" ]; then
            QT_DIR="C:/qt-static"
          else
            QT_DIR="$HOME/qt-static"
          fi
          PRIV_DIR="$QT_DIR/lib/cmake/Qt6CorePrivate"
          mkdir -p "$PRIV_DIR"

          # Find private headers include path
          PRIV_INC=""
          for candidate in \
            "$QT_DIR/include/QtCore/$QT_VER" \
            "$QT_DIR/lib/QtCore.framework/Versions/A/Headers/$QT_VER"; do
            if [ -d "$candidate" ]; then
              PRIV_INC="$candidate"
              break
            fi
          done

          cat > "$PRIV_DIR/Qt6CorePrivateConfig.cmake" << 'ENDCMAKE'
          cmake_minimum_required(VERSION 3.16)
          include(CMakeFindDependencyMacro)
          if(NOT TARGET Qt6::Core)
              find_dependency(Qt6Core)
          endif()
          set(Qt6CorePrivate_FOUND TRUE)
          if(NOT TARGET Qt6::CorePrivate)
              include("${CMAKE_CURRENT_LIST_DIR}/Qt6CorePrivateTargets.cmake")
          endif()
          ENDCMAKE

          cat > "$PRIV_DIR/Qt6CorePrivateTargets.cmake" << ENDCMAKE
          add_library(Qt6::CorePrivate INTERFACE IMPORTED)
          set_target_properties(Qt6::CorePrivate PROPERTIES
              INTERFACE_LINK_LIBRARIES "Qt6::Core"
              _qt_is_private_module TRUE
              _qt_public_module_target_name "Qt6::Core"
              _qt_package_name "Qt6CorePrivate"
          )
          if(EXISTS "$PRIV_INC")
              set_property(TARGET Qt6::CorePrivate APPEND PROPERTY
                  INTERFACE_INCLUDE_DIRECTORIES "$PRIV_INC")
          endif()
          ENDCMAKE

          cat > "$PRIV_DIR/Qt6CorePrivateConfigVersion.cmake" << ENDCMAKE
          set(PACKAGE_VERSION "$QT_VER")
          if(PACKAGE_FIND_VERSION_RANGE)
              if(PACKAGE_FIND_VERSION_RANGE_MIN STREQUAL "INCLUDE"
                  AND PACKAGE_VERSION VERSION_GREATER_EQUAL PACKAGE_FIND_VERSION_MIN
                  AND PACKAGE_VERSION VERSION_LESS_EQUAL PACKAGE_FIND_VERSION_RANGE_MAX)
                  set(PACKAGE_VERSION_COMPATIBLE TRUE)
              else()
                  set(PACKAGE_VERSION_COMPATIBLE FALSE)
              endif()
          elseif(PACKAGE_FIND_VERSION VERSION_EQUAL PACKAGE_VERSION)
              set(PACKAGE_VERSION_COMPATIBLE TRUE)
              set(PACKAGE_VERSION_EXACT TRUE)
          elseif(PACKAGE_FIND_VERSION VERSION_LESS PACKAGE_VERSION)
              set(PACKAGE_VERSION_COMPATIBLE TRUE)
          else()
              set(PACKAGE_VERSION_COMPATIBLE FALSE)
          endif()
          ENDCMAKE

          echo "Generated Qt6CorePrivate stub in $PRIV_DIR"
          ls -la "$PRIV_DIR/"

      - name: Align submodule Qt versions
        shell: bash
        run: |
          QT_VER=6.8.2
          if [ "$RUNNER_OS" = "macOS" ]; then
            sed -i '' "s/QT_REPO_MODULE_VERSION \"[^\"]*\"/QT_REPO_MODULE_VERSION \"${QT_VER}\"/" \
              external/qtmcp/.cmake.conf external/qtpsd/.cmake.conf
          else
            sed -i "s/QT_REPO_MODULE_VERSION \"[^\"]*\"/QT_REPO_MODULE_VERSION \"${QT_VER}\"/" \
              external/qtmcp/.cmake.conf external/qtpsd/.cmake.conf
          fi

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="/c/qt-static/bin:$PATH"
            PREFIX_PATH="C:/qt-static"
          else
            export PATH="$HOME/qt-static/bin:$PATH"
            PREFIX_PATH="$HOME/qt-static"
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX_PATH" -G Ninja
          cmake --build build

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp build/mcp-design2gui.exe "dist/mcp-design2gui-${{ matrix.name }}.exe"
          else
            cp build/mcp-design2gui "dist/mcp-design2gui-${{ matrix.name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-design2gui-${{ matrix.name }}
          path: dist/mcp-design2gui-*

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mcp-design2gui-*
